function render(){const box=document.getElementById('cats');box.innerHTML='';C.forEach(cat=>{const el=document.createElement('div');el.className='cat';el.dataset.cat=cat.id;const allOn=cat.s.every(s=>pk.has(s.id));el.innerHTML=`<div class="cb"><div class="cd" style="color:${cat.c};background:${cat.c}"></div><span class="ci" style="color:${cat.c}">${IC[cat.id]||''}</span><span class="cl">${cat.l}</span><span class="cc">${cat.s.length}</span><span class="ct" data-c="${cat.id}">${allOn?'✕ Keine':'✓ Alle'}</span></div><div class="sg">${cat.s.map(s=>`<div class="sv${pk.has(s.id)?' on':''}" data-id="${s.id}"><div class="ck">${chk}</div><span class="nm">${s.n}</span><span class="ru">${s.r}</span></div>`).join('')}</div>`;box.appendChild(el)});box.querySelectorAll('.sv').forEach(c=>{c.addEventListener('click',e=>{rip(e,c);tog(c.dataset.id)})});box.querySelectorAll('.ct').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();togCat(b.dataset.c)}));obsCats();sync()}

function rip(e,el){const r=document.createElement('span');r.className='ripple';const rc=el.getBoundingClientRect();r.style.left=(e.clientX-rc.left)+'px';r.style.top=(e.clientY-rc.top)+'px';r.style.width=r.style.height=Math.max(rc.width,rc.height)+'px';el.appendChild(r);r.addEventListener('animationend',()=>r.remove())}
function tog(id){pk.has(id)?pk.delete(id):pk.add(id);const el=document.querySelector(`.sv[data-id="${id}"]`);if(el)el.classList.toggle('on',pk.has(id));updT();sync();clrP()}
function togCat(cid){const cat=C.find(c=>c.id===cid),ids=cat.s.map(s=>s.id),all=ids.every(i=>pk.has(i));ids.forEach(i=>all?pk.delete(i):pk.add(i));ids.forEach(i=>{const el=document.querySelector(`.sv[data-id="${i}"]`);if(el)el.classList.toggle('on',pk.has(i))});updT();sync();clrP()}

function updT(){C.forEach(cat=>{const all=cat.s.every(s=>pk.has(s.id));const b=document.querySelector(`.ct[data-c="${cat.id}"]`);if(b)b.textContent=all?'✕ Keine':'✓ Alle'})}

function animN(el,to){const fr=parseInt(el.textContent)||0;if(fr===to)return;const dur=Math.min(350,Math.abs(to-fr)*6);const st=performance.now();(function f(now){const p=Math.min((now-st)/dur,1);el.textContent=Math.round(fr+(to-fr)*(1-Math.pow(1-p,3)));if(p<1)requestAnimationFrame(f)})(st)}
function sync(){const u=uniq(),rules=u.reduce((a,s)=>a+s.r,0);animN(document.getElementById('sP'),u.length);animN(document.getElementById('bR'),rules);document.getElementById('bS').textContent=u.length;const has=u.length>0;document.getElementById('xU').disabled=!has;document.getElementById('xP').disabled=!has;document.getElementById('xD').disabled=!has;document.getElementById('ringC').style.strokeDashoffset=CIRC-(CIRC*(rules/TOTAL))}

let aP=null;document.getElementById('presets').addEventListener('click',e=>{const btn=e.target.closest('.preset');if(!btn)return;const p=btn.dataset.p;if(aP===p){pickNone();aP=null;btn.classList.remove('active');return}pk.clear();(PRESETS[p]||[]).forEach(id=>pk.add(id));document.querySelectorAll('.sv').forEach(el=>el.classList.toggle('on',pk.has(el.dataset.id)));document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));btn.classList.add('active');aP=p;updT();sync()});

function obsCats(){if(!('IntersectionObserver' in window)){document.querySelectorAll('.cat').forEach(c=>c.classList.add('vis'));return}const ob=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');ob.unobserve(e.target)}})},{threshold:.08,rootMargin:'0px 0px -30px 0px'});document.querySelectorAll('.cat').forEach(c=>ob.observe(c))}

async function fetchL(sv){let o=`# =============================================================\n# AdGuard Home – Custom Allowlist\n# Generated: ${new Date().toISOString().split('T')[0]}\n# Services: ${sv.map(s=>s.n).join(', ')}\n# Source: https://github.com/Der-Felix/AdGuard-Home-Allowlists\n# =============================================================\n\n`;for(const s of sv){try{const r=await fetch(`${R}/lists/${s.id}.txt`);if(r.ok)o+=(await r.text())+'\n\n'}catch(e){o+=`# Error: ${s.id}\n\n`}}return o}
